<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vin Tech Electronics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="images">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: Arial, sans-serif;
            padding-bottom: 90px;
        }

        .top-bar {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 18px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .brand {
            font-size: 28px;
            font-weight: bold;
            color: #00ffb3;
        }

        .search-box {
            margin-top: 15px;
        }

        .search-box input {
            border-radius: 50px;
            border: none;
            padding: 12px 20px;
        }

        .banner {
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            margin: 20px;
            border-radius: 20px;
            padding: 30px;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .banner h2 {
            font-weight: bold;
            font-size: 30px;
        }

        .categories {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 20px;
        }

        .category-card {
            min-width: 120px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .category-card i {
            font-size: 30px;
            margin-bottom: 10px;
            color: #2563eb;
        }

        .section-title {
            margin: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #0f172a;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 0 20px 20px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .product-body {
            padding: 15px;
        }

        .product-title {
            font-size: 18px;
            font-weight: bold;
            color: #0f172a;
        }

        .price {
            color: #16a34a;
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
        }

        .add-btn {
            width: 100%;
            border: none;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            color: white;
            padding: 10px;
            border-radius: 12px;
            font-weight: bold;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            z-index: 999;
        }

        .bottom-nav a {
            text-decoration: none;
            color: #0f172a;
            text-align: center;
            font-size: 14px;
        }

        .bottom-nav i {
            display: block;
            font-size: 22px;
            margin-bottom: 5px;
        }

        @media(max-width: 768px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="d-flex justify-content-between align-items-center">
        <div class="brand">VIN TECH</div>

        <a href="{{ url_for('cart') }}" class="btn btn-warning rounded-pill">
            <i class="fa fa-shopping-cart"></i>
        </a>
    </div>

    <div class="search-box">
        <input type="text" class="form-control" placeholder="Search phones, laptops, electronics...">
    </div>
</div>

<div class="banner">
    <h2>Latest Electronics</h2>
    <p>Phones, Laptops, Accessories & More</p>

    <a href="{{ url_for('products') }}" class="btn btn-light rounded-pill px-4">
        Shop Now
    </a>
</div>

<h3 class="section-title">Categories</h3>

<div class="categories">

    <div class="category-card">
        <i class="fa fa-mobile-screen"></i>
        <p>Phones</p>
    </div>

    <div class="category-card">
        <i class="fa fa-laptop"></i>
        <p>Laptops</p>
    </div>

    <div class="category-card">
        <i class="fa fa-headphones"></i>
        <p>Audio</p>
    </div>

    <div class="category-card">
        <i class="fa fa-plug"></i>
        <p>Electronics</p>
    </div>

</div>

<h3 class="section-title">Trending Products</h3>

<div class="product-grid">

<div class="product-card">
        <img src="{{ url_for('static', filename='images/iphone.jpg') }}"
                     alt="{{ product }}"
                     class="img-fluid mb-3"
                     style="height:550px; width:100%; object-fit:cover; border-radius:5px;">
        
        <div class="product-body">
            <div class="product-title">iphone 13</div>
            <div class="price">KES 78,000</div>

            <form method="POST" action="{{ url_for('add_to_cart') }}">
                <input type="hidden" name="product" value="iphone">
                <input type="hidden" name="price" value="98000">

                <button class="add-btn">
                    Add To Cart
                </button>
            </form>
        </div>
    </div>

</div> 
       
<div class="product-card">
        <div class="product-card">
        <img src="{{ url_for('static', filename='images/HP laptop.jpg') }}"
                     alt="{{ product }}"
                     class="img-fluid mb-3"
                     style="height:1050px; width:100%; object-fit:cover; border-radius:5px;">

        <div class="product-body">
            <div class="product-title">HP laptop</div>
            <div class="price">KES 52,500</div>

            <form method="POST" action="{{ url_for('add_to_cart') }}">
                <input type="hidden" name="product" value="HP laptop">
                <input type="hidden" name="price" value="52,500">

                <button class="add-btn">
                    Add To Cart
                </button>
            </form>
        </div>
    </div>

<div class="bottom-nav">

    <a href="{{ url_for('home') }}">
        <i class="fa fa-house"></i>
        Home
    </a>

    <a href="{{ url_for('products') }}">
        <i class="fa fa-box"></i>
        Products
    </a>

    <a href="{{ url_for('cart') }}">
        <i class="fa fa-cart-shopping"></i>
        Cart
    </a>

    <a href="{{ url_for('contact') }}">
        <i class="fa fa-phone"></i>
        Contact
    </a>

</div>

</body>
</html>
