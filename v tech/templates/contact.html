<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Vin Tech</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">
                Vin Tech
            </a>

            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('home') }}">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('products') }}">Products</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="{{ url_for('contact') }}">Contact</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('login') }}">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contact Section -->
    <section class="py-5 bg-light min-vh-100">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">

                    <div class="card shadow-lg border-0 rounded-4">
                        <div class="card-body p-5">

                            <h1 class="text-center mb-3">Contact Vin Tech</h1>

                            <p class="text-center text-muted mb-5">
                                Reach out for orders, inquiries, repairs, or technical support.
                            </p>

                            <form method="POST" action="{{ url_for('contact') }}">

                                <div class="mb-3">
                                    <label class="form-label">Full Name</label>
                                    <input type="text"
                                           class="form-control"
                                           name="name"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Email Address</label>
                                    <input type="email"
                                           class="form-control"
                                           name="email"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Subject</label>
                                    <input type="text"
                                           class="form-control"
                                           name="subject"
                                           required>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label">Message</label>
                                     <textarea class="form-control"
                                              name="message"
                                              rows="6"
                                              required></textarea>
                                </div>

                                <button type="submit"
                                        class="btn btn-primary btn-lg w-100">
                                    Send Message
                                </button>
                            </form>

                            <hr class="my-5">

                            <div class="row text-center">
                                <div class="col-md-4 mb-3">
                                    <h5>Phone</h5>
                                    <p>0740742614</p>
                                </div>

                                <div class="col-md-4 mb-3">
                                    <h5>Email</h5>
                                    <p>info@vintech.co.ke</p>
                                </div>

                                <div class="col-md-4 mb-3">
                                    <h5>Location</h5>
                                    <p>Mombasa, Kenya</p>
                                </div>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-4">
        <p class="mb-0">
            &copy; 2026 Vin Tech. All Rights Reserved.
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
